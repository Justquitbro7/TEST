<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JAILEX | Alerts Canvas</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap">
    <style>
        body { 
            margin: 0; padding: 0; overflow: hidden; background: transparent; 
            font-family: 'Orbitron', sans-serif; display: flex; justify-content: center; height: 100vh;
        }
        
        #alert-container {
            margin-top: 50px; background: rgba(6, 14, 26, 0.95);
            border: 2px solid #00d2ff; border-radius: 8px; padding: 20px 50px; text-align: center;
            opacity: 0; transform: scale(0.8) translateY(-50px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .fire-alert { opacity: 1 !important; transform: scale(1) translateY(0) !important; }

        .alert-title { font-size: 18px; letter-spacing: 4px; }
        .alert-user { color: #53FC18; font-size: 36px; margin-top: 5px; text-shadow: 0 0 15px #53FC18; }
    </style>
</head>
<body>

    <div id="alert-container">
        <div class="alert-title" id="action-text">STANDBY</div>
        <div class="alert-user" id="username-text">USER</div>
    </div>

    <script>
        // Open the receiver
        const alertPipe = new BroadcastChannel('jailex_internal_alerts');
        let alertTimeout;

        alertPipe.onmessage = function(event) {
            const data = event.data;
            const box = document.getElementById('alert-container');
            const actionText = document.getElementById('action-text');
            const userText = document.getElementById('username-text');
            
            // 1. Update the text
            actionText.innerText = data.action;
            userText.innerText = data.user;

            // 2. Inject the dynamic neon colors
            box.style.borderColor = data.color;
            box.style.boxShadow = `0 0 20px ${data.color}, inset 0 0 15px ${data.color}`;
            actionText.style.color = data.color;
            actionText.style.textShadow = `0 0 10px ${data.color}`;
            
            // 3. Fire the animation
            box.classList.add('fire-alert');
            
            // 4. Hide it after the duration finishes
            clearTimeout(alertTimeout);
            alertTimeout = setTimeout(() => {
                box.classList.remove('fire-alert');
            }, data.duration);
        };
    </script>
</body>
</html>
